{% extends 'base.html' %}

{% block title %}Maintenance Log | MediTrack{% endblock %}

{% block content %}
<div class="card">
    <h2>Log Maintenance for {{ item.name }}</h2>
    <form method="POST">
        <label>Status</label>
        <input name="status" placeholder="Maintenance status" required>
        <label>Notes</label>
        <textarea name="notes" placeholder="Optional notes"></textarea>
        <button type="submit">Save Maintenance</button>
    </form>
</div>
{% endblock %}
